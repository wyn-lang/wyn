name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup LLVM
        id: setup_llvm
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
          cached: true

      - name: Verify LLVM Installation
        run: |
          echo "LLVM Path: ${{ steps.setup_llvm.outputs.llvm-path }}"
          export PATH="${{ steps.setup_llvm.outputs.llvm-path }}/bin:$PATH"
          export DYLD_LIBRARY_PATH="/usr/lib:${{ steps.setup_llvm.outputs.llvm-path }}/lib"
          which llc
          llc --version

      - name: Build Compiler
        run: |
          export PATH="${{ steps.setup_llvm.outputs.llvm-path }}/bin:$PATH"
          export DYLD_LIBRARY_PATH="/usr/lib:${{ steps.setup_llvm.outputs.llvm-path }}/lib"
          make

      - name: Run Test Suite
        run: |
          export PATH="${{ steps.setup_llvm.outputs.llvm-path }}/bin:$PATH"
          export DYLD_LIBRARY_PATH="/usr/lib:${{ steps.setup_llvm.outputs.llvm-path }}/lib"
          make test

      - name: Test Examples
        run: |
          export PATH="${{ steps.setup_llvm.outputs.llvm-path }}/bin:$PATH"
          export DYLD_LIBRARY_PATH="/usr/lib:${{ steps.setup_llvm.outputs.llvm-path }}/lib"
          ./build/wyn run examples/hello.wyn
          ./build/wyn run examples/fibonacci.wyn
          ./build/wyn run examples/extension_methods.wyn

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wyn-macos
          path: build/wyn

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup LLVM
        id: setup_llvm
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
          cached: true

      - name: Verify LLVM Installation
        run: |
          echo "LLVM Path: ${{ steps.setup_llvm.outputs.llvm-path }}"
          export PATH="${{ steps.setup_llvm.outputs.llvm-path }}/bin:$PATH"
          export LD_LIBRARY_PATH="/usr/lib:${{ steps.setup_llvm.outputs.llvm-path }}/lib"
          which llc
          llc --version

      - name: Build Compiler
        run: |
          export PATH="${{ steps.setup_llvm.outputs.llvm-path }}/bin:$PATH"
          export LD_LIBRARY_PATH="/usr/lib:${{ steps.setup_llvm.outputs.llvm-path }}/lib"
          make

      - name: Run Test Suite
        run: |
          export PATH="${{ steps.setup_llvm.outputs.llvm-path }}/bin:$PATH"
          export LD_LIBRARY_PATH="/usr/lib:${{ steps.setup_llvm.outputs.llvm-path }}/lib"
          make test

      - name: Test Examples
        run: |
          export PATH="${{ steps.setup_llvm.outputs.llvm-path }}/bin:$PATH"
          export LD_LIBRARY_PATH="/usr/lib:${{ steps.setup_llvm.outputs.llvm-path }}/lib"
          ./build/wyn run examples/hello.wyn
          ./build/wyn run examples/fibonacci.wyn
          ./build/wyn run examples/extension_methods.wyn

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wyn-linux
          path: build/wyn
