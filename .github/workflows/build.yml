name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
          cached: true

      - name: Build Compiler
        run: |
          export PATH="$LLVM_PATH/bin:$PATH"
          make

      - name: Run Test Suite
        run: |
          export PATH="$LLVM_PATH/bin:$PATH"
          make test

      - name: Test Examples
        run: |
          export PATH="$LLVM_PATH/bin:$PATH"
          ./build/wyn run examples/hello.wyn
          ./build/wyn run examples/fibonacci.wyn
          ./build/wyn run examples/extension_methods.wyn

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wyn-macos
          path: build/wyn

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
          cached: true

      - name: Build Compiler
        run: |
          export PATH="$LLVM_PATH/bin:$PATH"
          make

      - name: Run Test Suite
        run: |
          export PATH="$LLVM_PATH/bin:$PATH"
          make test

      - name: Test Examples
        run: |
          export PATH="$LLVM_PATH/bin:$PATH"
          ./build/wyn run examples/hello.wyn
          ./build/wyn run examples/fibonacci.wyn
          ./build/wyn run examples/extension_methods.wyn

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wyn-linux
          path: build/wyn
