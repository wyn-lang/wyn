name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-14 clang-14
          sudo ln -sf /usr/bin/llvm-config-14 /usr/bin/llvm-config

      - name: Build Compiler
        run: make

      - name: Run Test Suite
        run: make test

      - name: Test Examples
        run: |
          ./build/wyn run examples/hello.wyn
          ./build/wyn run examples/fibonacci.wyn
          ./build/wyn run examples/extension_methods.wyn

      - name: Test REPL
        run: echo "print(42)" | ./build/wyn repl || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wyn-${{ matrix.os }}
          path: build/wyn
