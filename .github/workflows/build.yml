name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          # Use system clang/llvm if available, otherwise install
          if ! command -v llc &> /dev/null; then
            echo "Installing LLVM..."
            brew install llvm
            echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH
          else
            echo "LLVM already available"
          fi

      - name: Verify LLVM
        run: |
          which llc || echo "llc not in PATH"
          llc --version || echo "llc not working"

      - name: Build Compiler
        run: make

      - name: Run Test Suite
        run: make test

      - name: Test Examples
        run: |
          ./build/wyn run examples/hello.wyn
          ./build/wyn run examples/extension_methods.wyn

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wyn-macos
          path: build/wyn

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-14 clang-14
          sudo update-alternatives --install /usr/bin/llc llc /usr/bin/llc-14 100

      - name: Verify LLVM
        run: |
          which llc
          llc --version

      - name: Build Compiler
        run: make

      - name: Run Test Suite
        run: make test

      - name: Test Examples
        run: |
          ./build/wyn run examples/hello.wyn
          ./build/wyn run examples/extension_methods.wyn

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wyn-linux
          path: build/wyn
